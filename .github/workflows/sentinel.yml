name: Sentinel

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assess:
    name: Advisory release assessment
    runs-on: ubuntu-latest
    steps:
      - name: Check out Lab
        uses: actions/checkout@v4
        with:
          path: lab

      - name: Check out Sentinel
        uses: actions/checkout@v4
        with:
          repository: mateoRc/sentinel
          path: sentinel
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sentinel/pyproject.toml

      - name: Install Sentinel
        run: python -m pip install --editable ./sentinel

      - name: Collect deterministic evidence
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          required = [
              Path("lab/sentinel.yml"),
              Path("lab/docker-compose.yml"),
              Path("lab/docker-compose.prod.yml"),
          ]
          missing = [str(path) for path in required if not path.is_file()]
          status = "failed" if missing else "passed"
          evidence = (
              f"missing required files: {', '.join(missing)}"
              if missing
              else "Sentinel policy and Compose configurations are present"
          )
          payload = {
              "project": "backend-lab",
              "commit": os.environ["COMMIT_SHA"],
              "checks": [
                  {
                      "name": "release-configuration",
                      "status": status,
                      "evidence": evidence,
                  }
              ],
          }
          Path("sentinel-report").mkdir()
          Path("sentinel-report/evidence.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run mock analysis
        run: |
          sentinel assess \
            --provider mock \
            --input sentinel-report/evidence.json \
            --json-output sentinel-report/assessment.json \
            --markdown-output sentinel-report/assessment.md

      - name: Publish summary
        run: cat sentinel-report/assessment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create public status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          source = json.loads(
              Path("sentinel-report/assessment.json").read_text(encoding="utf-8")
          )
          public = {
              "commit": source["commit"],
              "analyzed_at": source["analyzed_at"],
              "risk": source["risk"],
              "checks": [
                  {"name": check["name"], "status": check["status"]}
                  for check in source["checks"]
              ],
              "summary": source["summary"],
              "provider": source["provider"],
          }
          Path("sentinel-report/sentinel.json").write_text(
              json.dumps(public, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-assessment
          path: sentinel-report/
          retention-days: 14

      - name: Configure deployment SSH
        if: github.event_name == 'push'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$SERVER_HOST" > ~/.ssh/known_hosts
          test "$(ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | awk '{print $2}')" = \
            "SHA256:ScA4PoeUfbgh+A4EpGlLpUqbETbwaoXTHRCI/s+NGXc"

      - name: Publish dashboard status
        if: github.event_name == 'push'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp sentinel-report/sentinel.json \
            deploy@"$SERVER_HOST":/tmp/sentinel-"$GITHUB_RUN_ID".json
          ssh deploy@"$SERVER_HOST" bash -s -- "$GITHUB_RUN_ID" <<'SCRIPT'
          set -euo pipefail
          run_id="$1"
          source="/tmp/sentinel-$run_id.json"
          directory=/home/deploy/backend_lab/lab/runtime
          install -d -m 755 "$directory"
          install -m 644 "$source" "$directory/sentinel.json.tmp"
          mv "$directory/sentinel.json.tmp" "$directory/sentinel.json"
          rm "$source"
          SCRIPT
