name: Sentinel

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assess:
    name: Advisory release assessment
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out Lab
        uses: actions/checkout@v4
        with:
          path: lab
          persist-credentials: false

      - name: Check out Sentinel
        uses: actions/checkout@v4
        with:
          repository: mateoRc/sentinel
          path: sentinel
          persist-credentials: false

      - name: Check out Vaultsh
        uses: actions/checkout@v4
        with:
          repository: mateoRc/vaultsh
          path: vaultsh
          persist-credentials: false

      - name: Check out Atlas
        uses: actions/checkout@v4
        with:
          repository: mateoRc/atlas
          path: atlas
          persist-credentials: false

      - name: Check out Forge
        uses: actions/checkout@v4
        with:
          repository: mateoRc/forge
          path: forge
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sentinel/pyproject.toml

      - name: Install Sentinel
        run: python -m pip install --editable ./sentinel

      - name: Build and test Vaultsh
        id: vaultsh_build
        continue-on-error: true
        run: docker build --tag vaultsh:sentinel ./vaultsh

      - name: Build and test Atlas
        id: atlas_build
        continue-on-error: true
        run: docker build --tag atlas:sentinel ./atlas

      - name: Build and test Forge
        id: forge_build
        continue-on-error: true
        run: docker build --tag forge:sentinel ./forge

      - name: Scan repositories
        id: repository_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-repositories.json

      - name: Scan Vaultsh image
        id: vaultsh_scan
        if: always() && steps.vaultsh_build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: image
          image-ref: vaultsh:sentinel
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-vaultsh.json

      - name: Scan Atlas image
        id: atlas_scan
        if: always() && steps.atlas_build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: image
          image-ref: atlas:sentinel
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-atlas.json

      - name: Scan Forge image
        id: forge_scan
        if: always() && steps.forge_build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: image
          image-ref: forge:sentinel
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-forge.json

      - name: Create check plan
        env:
          COMMIT_SHA: ${{ github.sha }}
          VAULTSH_BUILD: ${{ steps.vaultsh_build.outcome }}
          ATLAS_BUILD: ${{ steps.atlas_build.outcome }}
          FORGE_BUILD: ${{ steps.forge_build.outcome }}
          REPOSITORY_SCAN: ${{ steps.repository_scan.outcome }}
          VAULTSH_SCAN: ${{ steps.vaultsh_scan.outcome }}
          ATLAS_SCAN: ${{ steps.atlas_scan.outcome }}
          FORGE_SCAN: ${{ steps.forge_scan.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def result(name, source, outcome):
              if outcome == "success":
                  status = "passed"
                  evidence = "check completed successfully"
              elif outcome in ("", "skipped"):
                  status = "warning"
                  evidence = "check skipped because its image build failed"
              else:
                  status = "failed"
                  evidence = "check reported a failure; inspect the workflow log"
              return {
                  "kind": "external",
                  "name": name,
                  "status": status,
                  "source": source,
                  "evidence": evidence,
              }

          def scanner_result(name, path, outcome):
              check = result(name, "Trivy", outcome)
              report = Path(path)
              if not report.is_file():
                  return check
              try:
                  data = json.loads(report.read_text(encoding="utf-8"))
                  results = data.get("Results") or []
                  vulnerabilities = sum(
                      len(item.get("Vulnerabilities") or []) for item in results
                  )
                  secrets = sum(len(item.get("Secrets") or []) for item in results)
                  misconfigurations = sum(
                      len(item.get("Misconfigurations") or []) for item in results
                  )
                  check["evidence"] = (
                      f"{vulnerabilities} high/critical vulnerabilities, "
                      f"{secrets} secrets, {misconfigurations} misconfigurations"
                  )
              except (OSError, json.JSONDecodeError, AttributeError):
                  check["evidence"] = "scanner report was unavailable or invalid"
              finally:
                  report.unlink(missing_ok=True)
              return check

          plan = {
              "project": "backend-lab",
              "commit": os.environ["COMMIT_SHA"],
              "checks": [
                  result("vaultsh-tests", "Docker build", os.environ["VAULTSH_BUILD"]),
                  result("atlas-tests", "Docker build", os.environ["ATLAS_BUILD"]),
                  result("forge-tests", "Docker build", os.environ["FORGE_BUILD"]),
                  scanner_result(
                      "repository-security",
                      "trivy-repositories.json",
                      os.environ["REPOSITORY_SCAN"],
                  ),
                  scanner_result(
                      "vaultsh-image-security",
                      "trivy-vaultsh.json",
                      os.environ["VAULTSH_SCAN"],
                  ),
                  scanner_result(
                      "atlas-image-security",
                      "trivy-atlas.json",
                      os.environ["ATLAS_SCAN"],
                  ),
                  scanner_result(
                      "forge-image-security",
                      "trivy-forge.json",
                      os.environ["FORGE_SCAN"],
                  ),
                  {
                      "kind": "command",
                      "name": "compose-development",
                      "command": [
                          "docker", "compose", "-f", "docker-compose.yml",
                          "config", "--quiet"
                      ],
                      "working_directory": "lab",
                      "environment": {
                          "ATLAS_AUTH_TOKEN": "sentinel-validation",
                          "FORGE_AUTH_TOKEN": "sentinel-validation",
                      },
                  },
                  {
                      "kind": "command",
                      "name": "compose-production",
                      "command": [
                          "docker", "compose", "-f", "docker-compose.prod.yml",
                          "config", "--quiet"
                      ],
                      "working_directory": "lab",
                      "environment": {
                          "DOMAIN": "example.invalid",
                          "ATLAS_AUTH_TOKEN": "sentinel-validation",
                          "FORGE_AUTH_TOKEN": "sentinel-validation",
                      },
                  },
                  {
                      "kind": "file_policy",
                      "name": "security-headers",
                      "path": "lab/Caddyfile",
                      "required": [
                          "Strict-Transport-Security",
                          "X-Content-Type-Options",
                          "X-Frame-Options",
                          "Referrer-Policy",
                          "-Server",
                      ],
                  },
                  {
                      "kind": "file_policy",
                      "name": "internal-network",
                      "path": "lab/docker-compose.prod.yml",
                      "required": ["backend:", "internal: true"],
                      "forbidden": ["8080:8080", "8080:"],
                  },
              ],
          }
          Path("sentinel-report").mkdir()
          Path("sentinel-report/plan.json").write_text(
              json.dumps(plan, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run deterministic checks
        run: |
          sentinel collect \
            --plan sentinel-report/plan.json \
            --workspace . \
            --output sentinel-report/evidence.json

      - name: Run mock analysis
        run: |
          sentinel assess \
            --provider mock \
            --input sentinel-report/evidence.json \
            --config lab/sentinel.yml \
            --json-output sentinel-report/assessment.json \
            --markdown-output sentinel-report/assessment.md

      - name: Publish summary
        run: cat sentinel-report/assessment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create public status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          source = json.loads(
              Path("sentinel-report/assessment.json").read_text(encoding="utf-8")
          )
          public = {
              "commit": source["commit"],
              "analyzed_at": source["analyzed_at"],
              "risk": source["risk"],
              "decision": source["decision"],
              "checks": [
                  {"name": check["name"], "status": check["status"]}
                  for check in source["checks"]
              ],
              "summary": source["summary"],
              "provider": source["provider"],
          }
          Path("sentinel-report/sentinel.json").write_text(
              json.dumps(public, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-assessment
          path: sentinel-report/
          retention-days: 14

      - name: Configure deployment SSH
        if: github.event_name == 'push'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$SERVER_HOST" > ~/.ssh/known_hosts
          test "$(ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | awk '{print $2}')" = \
            "SHA256:ScA4PoeUfbgh+A4EpGlLpUqbETbwaoXTHRCI/s+NGXc"

      - name: Publish dashboard status
        if: github.event_name == 'push'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp sentinel-report/sentinel.json \
            deploy@"$SERVER_HOST":/tmp/sentinel-"$GITHUB_RUN_ID".json
          ssh deploy@"$SERVER_HOST" bash -s -- "$GITHUB_RUN_ID" <<'SCRIPT'
          set -euo pipefail
          run_id="$1"
          source="/tmp/sentinel-$run_id.json"
          directory=/home/deploy/backend_lab/lab/runtime
          install -d -m 755 "$directory"
          install -m 644 "$source" "$directory/sentinel.json.tmp"
          mv "$directory/sentinel.json.tmp" "$directory/sentinel.json"
          rm "$source"
          SCRIPT
