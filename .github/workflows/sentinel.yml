name: Sentinel

on:
  pull_request:
  push:
    branches: [main]
  repository_dispatch:
    types: [service-ci-completed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  assess:
    name: Advisory release assessment
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out Lab
        uses: actions/checkout@v4
        with:
          path: lab
          fetch-depth: 0
          persist-credentials: false

      - name: Check out Sentinel
        uses: actions/checkout@v4
        with:
          repository: mateoRc/sentinel
          path: sentinel
          persist-credentials: false

      - name: Check out Vaultsh
        uses: actions/checkout@v4
        with:
          repository: mateoRc/vaultsh
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repository == 'vaultsh' && github.event.client_payload.sha || 'main' }}
          path: vaultsh
          persist-credentials: false

      - name: Check out Atlas
        uses: actions/checkout@v4
        with:
          repository: mateoRc/atlas
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repository == 'atlas' && github.event.client_payload.sha || 'main' }}
          path: atlas
          persist-credentials: false

      - name: Check out Forge
        uses: actions/checkout@v4
        with:
          repository: mateoRc/forge
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repository == 'forge' && github.event.client_payload.sha || 'main' }}
          path: forge
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sentinel/pyproject.toml

      - name: Install Sentinel
        run: python -m pip install --editable ./sentinel

      - name: Analyze changed components
        id: impact
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          DISPATCH_REPOSITORY: ${{ github.event.client_payload.repository }}
          DISPATCH_CONCLUSION: ${{ github.event.client_payload.conclusion }}
          DISPATCH_RUN_ID: ${{ github.event.client_payload.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          event = os.environ["EVENT_NAME"]
          if event == "repository_dispatch":
              repository = os.environ["DISPATCH_REPOSITORY"]
              if repository not in {"vaultsh", "atlas", "forge"}:
                  raise SystemExit(f"unsupported dispatch repository: {repository}")
              if os.environ["DISPATCH_CONCLUSION"] != "success":
                  raise SystemExit("service dispatch must report a successful CI run")
              run_id = os.environ["DISPATCH_RUN_ID"]
              if not run_id.isdigit():
                  raise SystemExit("service dispatch run_id must be numeric")
              changes = [f"{repository}/__repository_change__"]
              base = ""
          elif event == "pull_request":
              base = os.environ["BASE_SHA"]
          elif event == "push":
              before = os.environ.get("BEFORE_SHA", "")
              base = "" if not before or before == "0" * 40 else before
          else:
              base = ""

          if event != "repository_dispatch" and base:
              output = subprocess.check_output(
                  ["git", "-C", "lab", "diff", "--name-only", f"{base}...HEAD"],
                  text=True,
              )
              changes = [f"lab/{line}" for line in output.splitlines() if line]
          elif event != "repository_dispatch":
              changes = [
                  "lab/__manual__",
                  "vaultsh/__manual__",
                  "atlas/__manual__",
                  "forge/__manual__",
                  "sentinel/__manual__",
              ]
          if not changes:
              changes = ["lab/__no_changes__"]
          Path("sentinel-report").mkdir(exist_ok=True)
          Path("sentinel-report/changes.json").write_text(
              json.dumps(changes, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          sentinel impact \
            --changes sentinel-report/changes.json \
            --rules lab/sentinel-impact.json \
            --output sentinel-report/impact.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          impact = json.loads(
              Path("sentinel-report/impact.json").read_text(encoding="utf-8")
          )
          values = {
              name: name in impact["services"]
              for name in ("vaultsh", "atlas", "forge")
          }
          values.update({
              name: name in impact["checks"]
              for name in ("integration", "deployment", "sentinel")
          })
          values.update({
              f"{name}_build": f"{name}-build" in impact["checks"]
              for name in ("vaultsh", "atlas", "forge")
          })
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              for name, enabled in values.items():
                  output.write(f"{name}={str(enabled).lower()}\n")
          PY

      - name: Authenticate integration image pulls
        if: steps.impact.outputs.integration == 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || 'mateoRc' }}
        run: |
          if [ -z "$GHCR_TOKEN" ] || [ -z "$GHCR_USERNAME" ]; then
            echo "GHCR read credentials are not configured; using anonymous pulls"
            exit 0
          fi
          printf '%s' "$GHCR_TOKEN" |
            docker login ghcr.io --username "$GHCR_USERNAME" --password-stdin

      - name: Build and test Vaultsh
        id: vaultsh_build
        if: github.event_name != 'repository_dispatch' && steps.impact.outputs.vaultsh_build == 'true'
        continue-on-error: true
        run: docker build --tag vaultsh:sentinel ./vaultsh

      - name: Build and test Atlas
        id: atlas_build
        if: github.event_name != 'repository_dispatch' && steps.impact.outputs.atlas_build == 'true'
        continue-on-error: true
        run: docker build --tag atlas:sentinel ./atlas

      - name: Build and test Forge
        id: forge_build
        if: github.event_name != 'repository_dispatch' && steps.impact.outputs.forge_build == 'true'
        continue-on-error: true
        run: docker build --tag forge:sentinel ./forge

      - name: Scan repositories
        id: repository_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-repositories.json

      - name: Scan Vaultsh image
        id: vaultsh_scan
        if: always() && steps.vaultsh_build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: image
          image-ref: vaultsh:sentinel
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-vaultsh.json

      - name: Scan Atlas image
        id: atlas_scan
        if: always() && steps.atlas_build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: image
          image-ref: atlas:sentinel
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-atlas.json

      - name: Scan Forge image
        id: forge_scan
        if: always() && steps.forge_build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: image
          image-ref: forge:sentinel
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: json
          output: trivy-forge.json

      - name: Resolve checked-out service versions
        id: versions
        run: |
          echo "vault=$(git -C vaultsh rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "atlas=$(git -C atlas rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "forge=$(git -C forge rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create check plan
        env:
          COMMIT_SHA: ${{ github.event.client_payload.sha || github.sha }}
          VAULTSH_BUILD: ${{ steps.vaultsh_build.outcome }}
          ATLAS_BUILD: ${{ steps.atlas_build.outcome }}
          FORGE_BUILD: ${{ steps.forge_build.outcome }}
          REPOSITORY_SCAN: ${{ steps.repository_scan.outcome }}
          VAULTSH_SCAN: ${{ steps.vaultsh_scan.outcome }}
          ATLAS_SCAN: ${{ steps.atlas_scan.outcome }}
          FORGE_SCAN: ${{ steps.forge_scan.outcome }}
          VAULTSH_AFFECTED: ${{ steps.impact.outputs.vaultsh }}
          ATLAS_AFFECTED: ${{ steps.impact.outputs.atlas }}
          FORGE_AFFECTED: ${{ steps.impact.outputs.forge }}
          VAULTSH_BUILD_AFFECTED: ${{ steps.impact.outputs.vaultsh_build }}
          ATLAS_BUILD_AFFECTED: ${{ steps.impact.outputs.atlas_build }}
          FORGE_BUILD_AFFECTED: ${{ steps.impact.outputs.forge_build }}
          INTEGRATION_AFFECTED: ${{ steps.impact.outputs.integration }}
          DEPLOYMENT_AFFECTED: ${{ steps.impact.outputs.deployment }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REPOSITORY: ${{ github.event.client_payload.repository }}
          DISPATCH_RUN_ID: ${{ github.event.client_payload.run_id }}
          VAULT_VERSION: ${{ steps.versions.outputs.vault }}
          ATLAS_VERSION: ${{ steps.versions.outputs.atlas }}
          FORGE_VERSION: ${{ steps.versions.outputs.forge }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def result(name, source, outcome):
              if outcome == "success":
                  status = "passed"
                  evidence = "check completed successfully"
              elif outcome in ("", "skipped"):
                  status = "warning"
                  evidence = "check skipped because its image build failed"
              else:
                  status = "failed"
                  evidence = "check reported a failure; inspect the workflow log"
              return {
                  "kind": "external",
                  "name": name,
                  "status": status,
                  "source": source,
                  "evidence": evidence,
              }

          def scanner_result(name, path, outcome):
              check = result(name, "Trivy", outcome)
              report = Path(path)
              if not report.is_file():
                  return check
              try:
                  data = json.loads(report.read_text(encoding="utf-8"))
                  results = data.get("Results") or []
                  vulnerabilities = sum(
                      len(item.get("Vulnerabilities") or []) for item in results
                  )
                  examples = []
                  for item in results:
                      for finding in item.get("Vulnerabilities") or []:
                          identifier = clean(finding.get("VulnerabilityID", "unknown"), 40)
                          package = clean(finding.get("PkgName", "unknown"), 50)
                          installed = clean(finding.get("InstalledVersion", "unknown"), 40)
                          fixed = clean(finding.get("FixedVersion") or "no fix", 40)
                          examples.append(
                              f"{identifier} {package} {installed} -> {fixed}"
                          )
                  secrets = sum(len(item.get("Secrets") or []) for item in results)
                  misconfigurations = sum(
                      len(item.get("Misconfigurations") or []) for item in results
                  )
                  check["evidence"] = (
                      f"{vulnerabilities} high/critical vulnerabilities, "
                      f"{secrets} secrets, {misconfigurations} misconfigurations"
                  )
                  if examples:
                      check["evidence"] += "; " + "; ".join(examples[:3])
              except (OSError, json.JSONDecodeError, AttributeError):
                  check["evidence"] = "scanner report was unavailable or invalid"
              finally:
                  report.unlink(missing_ok=True)
              return check

          def clean(value, limit):
              return " ".join(str(value).split())[:limit]

          checks = [
              scanner_result(
                  "repository-security",
                  "trivy-repositories.json",
                  os.environ["REPOSITORY_SCAN"],
              ),
              {
                  "kind": "file_policy",
                  "name": "security-headers",
                  "path": "lab/Caddyfile",
                  "required": [
                      "Strict-Transport-Security",
                      "X-Content-Type-Options",
                      "X-Frame-Options",
                      "Referrer-Policy",
                      "-Server",
                  ],
              },
              {
                  "kind": "file_policy",
                  "name": "internal-network",
                  "path": "lab/docker-compose.prod.yml",
                  "required": ["backend:", "internal: true"],
                  "forbidden": ["8080:8080", "8080:"],
              },
          ]

          service_checks = (
              ("vaultsh", "vaultsh-tests", "vaultsh-image-security",
               "VAULTSH_BUILD", "VAULTSH_SCAN", "trivy-vaultsh.json"),
              ("atlas", "atlas-tests", "atlas-image-security",
               "ATLAS_BUILD", "ATLAS_SCAN", "trivy-atlas.json"),
              ("forge", "forge-tests", "forge-image-security",
               "FORGE_BUILD", "FORGE_SCAN", "trivy-forge.json"),
          )
          for service, test_name, scan_name, build_env, scan_env, report in service_checks:
              if os.environ[f"{service.upper()}_BUILD_AFFECTED"] == "true":
                  if (
                      os.environ["EVENT_NAME"] == "repository_dispatch"
                      and os.environ["DISPATCH_REPOSITORY"] == service
                  ):
                      run_id = os.environ["DISPATCH_RUN_ID"]
                      checks.append({
                          "kind": "external",
                          "name": test_name,
                          "status": "passed",
                          "source": f"{service} GitHub Actions run {run_id}",
                          "evidence": (
                              "service CI tested and published this exact commit"
                          ),
                      })
                      checks.append({
                          "kind": "external",
                          "name": scan_name,
                          "status": "warning",
                          "source": f"{service} GitHub Actions run {run_id}",
                          "evidence": "service CI does not yet publish image-scan evidence",
                      })
                  else:
                      checks.append(
                          result(test_name, "Docker build", os.environ[build_env])
                      )
                      checks.append(
                          scanner_result(scan_name, report, os.environ[scan_env])
                      )

          if os.environ["DEPLOYMENT_AFFECTED"] == "true":
              checks.extend([
                  {
                      "kind": "command",
                      "name": "compose-development",
                      "command": [
                          "docker", "compose", "-f", "docker-compose.yml",
                          "config", "--quiet"
                      ],
                      "working_directory": "lab",
                      "environment": {
                          "ATLAS_AUTH_TOKEN": "sentinel-validation",
                          "FORGE_AUTH_TOKEN": "sentinel-validation",
                      },
                  },
                  {
                      "kind": "command",
                      "name": "compose-production",
                      "command": [
                          "docker", "compose", "-f", "docker-compose.prod.yml",
                          "config", "--quiet"
                      ],
                      "working_directory": "lab",
                      "environment": {
                          "DOMAIN": "example.invalid",
                          "ATLAS_AUTH_TOKEN": "sentinel-validation",
                          "FORGE_AUTH_TOKEN": "sentinel-validation",
                          "VAULT_IMAGE": "ghcr.io/example/vaultsh:1111111111111111111111111111111111111111",
                          "ATLAS_IMAGE": "ghcr.io/example/atlas:2222222222222222222222222222222222222222",
                          "FORGE_IMAGE": "ghcr.io/example/forge:3333333333333333333333333333333333333333",
                      },
                  },
              ])

          if os.environ["INTEGRATION_AFFECTED"] == "true":
              compose = ["docker", "compose", "-f", "docker-compose.yml"]
              environment = {
                  "ATLAS_AUTH_TOKEN": "sentinel-validation",
                  "FORGE_AUTH_TOKEN": "sentinel-validation",
              }
              images = {
                  "vaultsh": (
                      "vaultsh:sentinel"
                      if (
                          os.environ["EVENT_NAME"] != "repository_dispatch"
                          and os.environ["VAULTSH_BUILD_AFFECTED"] == "true"
                      )
                      else f"ghcr.io/mateorc/vaultsh:{os.environ['VAULT_VERSION']}"
                  ),
                  "atlas": (
                      "atlas:sentinel"
                      if (
                          os.environ["EVENT_NAME"] != "repository_dispatch"
                          and os.environ["ATLAS_BUILD_AFFECTED"] == "true"
                      )
                      else f"ghcr.io/mateorc/atlas:{os.environ['ATLAS_VERSION']}"
                  ),
                  "forge": (
                      "forge:sentinel"
                      if (
                          os.environ["EVENT_NAME"] != "repository_dispatch"
                          and os.environ["FORGE_BUILD_AFFECTED"] == "true"
                      )
                      else f"ghcr.io/mateorc/forge:{os.environ['FORGE_VERSION']}"
                  ),
              }
              environment.update({
                  "VAULT_IMAGE": images["vaultsh"],
                  "ATLAS_IMAGE": images["atlas"],
                  "FORGE_IMAGE": images["forge"],
              })
              for service, image in images.items():
                  if (
                      os.environ["EVENT_NAME"] == "repository_dispatch"
                      or os.environ[f"{service.upper()}_BUILD_AFFECTED"] != "true"
                  ):
                      checks.append({
                          "kind": "command",
                          "name": f"pull-{service}-integration-image",
                          "command": ["docker", "pull", image],
                          "working_directory": "lab",
                      })
              checks.extend([
                  {
                      "kind": "command",
                      "name": "integration-stack",
                      "command": compose + ["up", "--no-build", "-d", "--wait"],
                      "working_directory": "lab",
                      "environment": environment,
                      "timeout_seconds": 1200,
                  },
                  {
                      "kind": "http_json",
                      "name": "vaultsh-content-contract",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "cat /cv/about.md"},
                      "expected": {"exit_code": 0},
                      "contains": {"output": "# About"},
                  },
                  {
                      "kind": "http_json",
                      "name": "vaultsh-atlas-contract",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "search Languages"},
                      "expected": {"exit_code": 0},
                      "contains": {"output": "/cv/skills.md"},
                  },
                  {
                      "kind": "http_json",
                      "name": "vaultsh-forge-contract",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "dashboard"},
                      "expected": {"exit_code": 0},
                      "contains": {"output": "LIVE ACTIVITY"},
                  },
                  {
                      "kind": "http_json",
                      "name": "path-traversal-rejected",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "cat /../../etc/passwd"},
                      "expected": {"exit_code": 1},
                  },
                  {
                      "kind": "http_json",
                      "name": "malformed-command-rejected",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "cat \"unterminated"},
                      "expected": {"exit_code": 2},
                      "contains": {"output": "unterminated quote"},
                  },
                  {
                      "kind": "http_json",
                      "name": "command-injection-rejected",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "cat /cv/about.md; whoami"},
                      "expected": {"exit_code": 2},
                  },
                  {
                      "kind": "command",
                      "name": "atlas-invalid-token-rejected",
                      "command": [
                          "docker", "compose", "-f", "docker-compose.yml",
                          "exec", "-T", "vault", "wget", "--quiet", "--spider",
                          "--header", "Authorization: Bearer invalid",
                          "http://atlas:8080/search?q=test",
                      ],
                      "working_directory": "lab",
                      "environment": environment,
                      "expected_exit_code": 1,
                  },
                  {
                      "kind": "command",
                      "name": "forge-invalid-token-rejected",
                      "command": [
                          "docker", "compose", "-f", "docker-compose.yml",
                          "exec", "-T", "vault", "wget", "--quiet", "--spider",
                          "--header", "Authorization: Bearer invalid",
                          "http://forge:8080/summary",
                      ],
                      "working_directory": "lab",
                      "environment": environment,
                      "expected_exit_code": 1,
                  },
                  {
                      "kind": "command",
                      "name": "stop-atlas-for-degradation-test",
                      "command": compose + ["stop", "atlas"],
                      "working_directory": "lab",
                      "environment": environment,
                  },
                  {
                      "kind": "http_json",
                      "name": "atlas-outage-degradation",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "cat /cv/about.md"},
                      "expected": {"exit_code": 0},
                      "contains": {"output": "# About"},
                  },
                  {
                      "kind": "http_json",
                      "name": "atlas-outage-is-isolated",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "search Languages"},
                      "expected": {"exit_code": 1, "output": "search unavailable"},
                  },
                  {
                      "kind": "command",
                      "name": "restore-atlas",
                      "command": compose + ["start", "atlas"],
                      "working_directory": "lab",
                      "environment": environment,
                  },
                  {
                      "kind": "command",
                      "name": "stop-forge-for-degradation-test",
                      "command": compose + ["stop", "forge"],
                      "working_directory": "lab",
                      "environment": environment,
                  },
                  {
                      "kind": "http_json",
                      "name": "forge-outage-degradation",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "cat /cv/about.md"},
                      "expected": {"exit_code": 0},
                      "contains": {"output": "# About"},
                  },
                  {
                      "kind": "http_json",
                      "name": "forge-outage-is-isolated",
                      "url": "http://127.0.0.1:8080/api/exec",
                      "json": {"line": "dashboard"},
                      "expected": {"exit_code": 1, "output": "dashboard unavailable"},
                  },
              ])

          plan = {
              "project": "backend-lab",
              "commit": os.environ["COMMIT_SHA"],
              "checks": checks,
          }
          Path("sentinel-report").mkdir(exist_ok=True)
          Path("sentinel-report/plan.json").write_text(
              json.dumps(plan, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run deterministic checks
        run: |
          sentinel collect \
            --plan sentinel-report/plan.json \
            --workspace . \
            --output sentinel-report/evidence.json

      - name: Stop integration stack
        if: always() && steps.impact.outputs.integration == 'true'
        working-directory: lab
        env:
          ATLAS_AUTH_TOKEN: sentinel-validation
          FORGE_AUTH_TOKEN: sentinel-validation
        run: docker compose -f docker-compose.yml down --volumes --remove-orphans

      - name: Run mock analysis
        run: |
          sentinel assess \
            --provider mock \
            --input sentinel-report/evidence.json \
            --config lab/sentinel.yml \
            --json-output sentinel-report/assessment.json \
            --markdown-output sentinel-report/assessment.md

      - name: Publish summary
        run: cat sentinel-report/assessment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish concise pull-request report
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const assessment = JSON.parse(
              fs.readFileSync("sentinel-report/assessment.json", "utf8")
            );
            const marker = "<!-- sentinel-assessment -->";
            const checks = assessment.checks
              .map(check => `| ${check.name} | ${check.status} |`)
              .join("\n");
            const body = [
              marker,
              "## Sentinel advisory assessment",
              "",
              `**Risk:** ${assessment.risk} · **Decision:** ${assessment.decision}`,
              "",
              assessment.summary,
              "",
              "| Check | Status |",
              "| --- | --- |",
              checks,
              "",
              "Sentinel remains advisory; this report does not gate deployment.",
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find(
              comment => comment.user.type === "Bot" && comment.body.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Create public status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          source = json.loads(
              Path("sentinel-report/assessment.json").read_text(encoding="utf-8")
          )
          def public_text(value, limit=240):
              return " ".join(str(value).split())[:limit]

          public = {
              "commit": source["commit"],
              "analyzed_at": source["analyzed_at"],
              "risk": source["risk"],
              "decision": source["decision"],
              "checks": [
                  {
                      "name": public_text(check["name"], 80),
                      "status": check["status"],
                      "source": public_text(check["source"], 80),
                      "evidence": public_text(check["evidence"]),
                  }
                  for check in source["checks"]
              ],
              "summary": public_text(source["summary"]),
              "actions": [
                  public_text(action) for action in source.get("actions", [])[:5]
              ],
              "provider": source["provider"],
          }
          Path("sentinel-report/sentinel.json").write_text(
              json.dumps(public, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-assessment
          path: sentinel-report/
          retention-days: 14

      - name: Configure deployment SSH
        if: github.event_name == 'push' || github.event_name == 'repository_dispatch'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$SERVER_HOST" > ~/.ssh/known_hosts
          test "$(ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | awk '{print $2}')" = \
            "SHA256:ScA4PoeUfbgh+A4EpGlLpUqbETbwaoXTHRCI/s+NGXc"

      - name: Publish dashboard status
        if: github.event_name == 'push' || github.event_name == 'repository_dispatch'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp sentinel-report/sentinel.json \
            deploy@"$SERVER_HOST":/tmp/sentinel-"$GITHUB_RUN_ID".json
          ssh deploy@"$SERVER_HOST" bash -s -- "$GITHUB_RUN_ID" <<'SCRIPT'
          set -euo pipefail
          run_id="$1"
          source="/tmp/sentinel-$run_id.json"
          directory=/home/deploy/backend_lab/lab/runtime
          install -d -m 755 "$directory"
          install -m 644 "$source" "$directory/sentinel.json.tmp"
          mv "$directory/sentinel.json.tmp" "$directory/sentinel.json"
          rm "$source"
          SCRIPT
