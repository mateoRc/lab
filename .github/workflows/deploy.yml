name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: Deploy selected versions or roll back to the previous release
        type: choice
        options: [deploy, rollback]
        default: deploy
      service:
        description: Service to deploy; rollback always restores the full release
        type: choice
        options: [all, vault, atlas, forge]
        default: all
      version:
        description: Optional full Git SHA for a targeted service deployment
        type: string
        required: false

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out lab
        uses: actions/checkout@v4

      - name: Test release manifest tooling
        run: python -m unittest tests.test_release_versions --verbose

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$SERVER_HOST" > ~/.ssh/known_hosts
          test "$(ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | awk '{print $2}')" = \
            "SHA256:ScA4PoeUfbgh+A4EpGlLpUqbETbwaoXTHRCI/s+NGXc"

      - name: Update public repositories
        if: github.event_name == 'push' || inputs.action != 'rollback'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh deploy@"$SERVER_HOST" 'bash -se' <<'SCRIPT'
          set -euo pipefail
          install -d /home/deploy/backend_lab/lab
          cd /home/deploy/backend_lab

          sync_repo() {
            name="$1"
            if [ -d "$name/.git" ]; then
              git -C "$name" fetch --prune origin main
              git -C "$name" reset --hard origin/main
            else
              git clone "https://github.com/mateoRc/$name.git"
            fi
          }

          sync_repo vaultsh
          sync_repo atlas
          sync_repo forge
          SCRIPT

      - name: Resolve immutable service versions
        id: versions
        if: github.event_name == 'push' || inputs.action != 'rollback'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "vault=$(ssh deploy@"$SERVER_HOST" git -C /home/deploy/backend_lab/vaultsh rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "atlas=$(ssh deploy@"$SERVER_HOST" git -C /home/deploy/backend_lab/atlas rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "forge=$(ssh deploy@"$SERVER_HOST" git -C /home/deploy/backend_lab/forge rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload lab repository
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          rsync --archive --delete \
            --exclude '.env' \
            --exclude '.git' \
            --exclude 'runtime' \
            ./ deploy@"$SERVER_HOST":/home/deploy/backend_lab/lab/

      - name: Upload production configuration
        env:
          ATLAS_AUTH_TOKEN: ${{ secrets.ATLAS_AUTH_TOKEN }}
          FORGE_AUTH_TOKEN: ${{ secrets.FORGE_AUTH_TOKEN }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          umask 077
          printf '%s\n' \
            'DOMAIN=mateolabs.dev' \
            "ATLAS_AUTH_TOKEN=$ATLAS_AUTH_TOKEN" \
            "FORGE_AUTH_TOKEN=$FORGE_AUTH_TOKEN" \
            'SESSION_LIMIT=5000' > production.env
          scp production.env deploy@"$SERVER_HOST":/home/deploy/backend_lab/lab/.env

      - name: Authenticate production image pulls
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          printf '%s' "$GHCR_TOKEN" |
            ssh deploy@"$SERVER_HOST" \
              "docker login ghcr.io --username '$GHCR_USERNAME' --password-stdin"

      - name: Select release versions
        env:
          ACTION: ${{ github.event_name == 'push' && 'deploy' || inputs.action }}
          ATLAS_VERSION: ${{ steps.versions.outputs.atlas }}
          FORGE_VERSION: ${{ steps.versions.outputs.forge }}
          REQUESTED_VERSION: ${{ inputs.version }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          TARGET: ${{ github.event_name == 'push' && 'all' || inputs.service }}
          VAULT_VERSION: ${{ steps.versions.outputs.vault }}
        run: |
          ssh deploy@"$SERVER_HOST" bash -s -- \
            "$ACTION" "$TARGET" "$REQUESTED_VERSION" \
            "$VAULT_VERSION" "$ATLAS_VERSION" "$FORGE_VERSION" <<'SCRIPT'
          set -euo pipefail
          action="$1"
          target="$2"
          requested="$3"
          vault="$4"
          atlas="$5"
          forge="$6"
          cd /home/deploy/backend_lab/lab
          install -d -m 755 runtime
          if [ "$action" = "rollback" ]; then
            python3 scripts/release_versions.py rollback --runtime runtime
          else
            python3 scripts/release_versions.py prepare \
              --runtime runtime \
              --target "$target" \
              --version "$requested" \
              --vault "$vault" \
              --atlas "$atlas" \
              --forge "$forge"
          fi
          SCRIPT

      - name: Deploy selected release
        env:
          ACTION: ${{ github.event_name == 'push' && 'deploy' || inputs.action }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          TARGET: ${{ github.event_name == 'push' && 'all' || inputs.service }}
        run: |
          ssh deploy@"$SERVER_HOST" bash -s -- "$ACTION" "$TARGET" <<'SCRIPT'
          set -euo pipefail
          action="$1"
          target="$2"
          [ "$action" = "rollback" ] && target=all
          cd /home/deploy/backend_lab/lab
          compose() {
            docker compose \
              --env-file .env \
              --env-file runtime/versions.env \
              -f docker-compose.prod.yml "$@"
          }
          compose config --quiet
          if [ "$target" = "all" ]; then
            compose pull
            compose up -d --wait
          else
            compose pull "$target"
            compose up -d --wait --no-deps "$target"
          fi
          SCRIPT

      - name: Verify
        run: curl --fail --show-error --silent --retry 12 --retry-delay 5 https://mateolabs.dev/healthz

      - name: Publish deployment status
        if: always()
        env:
          DEPLOYMENT_STATUS: ${{ job.status }}
          DEPLOYMENT_VERSION: deploy-${{ github.run_number }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          deployed_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ssh deploy@"$SERVER_HOST" bash -s -- \
            "$DEPLOYMENT_STATUS" "$DEPLOYMENT_VERSION" "$deployed_at" <<'SCRIPT'
          set -euo pipefail
          status="$1"
          version="$2"
          deployed_at="$3"
          directory=/home/deploy/backend_lab/lab/runtime
          install -d -m 755 "$directory"
          python3 - "$status" "$version" "$deployed_at" \
            "$directory/release.json" "$directory/deployment.json.tmp" <<'PY'
          import json
          import sys
          from pathlib import Path

          status, version, deployed_at, release_path, output_path = sys.argv[1:]
          services = json.loads(Path(release_path).read_text(encoding="utf-8"))
          payload = {
              "status": status,
              "version": version,
              "deployed_at": deployed_at,
              "services": services,
          }
          Path(output_path).write_text(
              json.dumps(payload, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          chmod 644 "$directory/deployment.json.tmp"
          mv "$directory/deployment.json.tmp" "$directory/deployment.json"
          SCRIPT
