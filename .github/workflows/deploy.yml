name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$SERVER_HOST" > ~/.ssh/known_hosts
          test "$(ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | awk '{print $2}')" = \
            "SHA256:ScA4PoeUfbgh+A4EpGlLpUqbETbwaoXTHRCI/s+NGXc"

      - name: Update repositories
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh deploy@"$SERVER_HOST" 'bash -se' <<'SCRIPT'
          set -euo pipefail
          install -d /home/deploy/backend_lab
          cd /home/deploy/backend_lab

          sync_repo() {
            name="$1"
            if [ -d "$name/.git" ]; then
              git -C "$name" pull --ff-only
            else
              git clone "https://github.com/mateoRc/$name.git"
            fi
          }

          sync_repo lab
          sync_repo vaultsh
          sync_repo atlas
          sync_repo forge
          SCRIPT

      - name: Upload production configuration
        env:
          ATLAS_AUTH_TOKEN: ${{ secrets.ATLAS_AUTH_TOKEN }}
          FORGE_AUTH_TOKEN: ${{ secrets.FORGE_AUTH_TOKEN }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          umask 077
          printf '%s\n' \
            'DOMAIN=mateolabs.dev' \
            "ATLAS_AUTH_TOKEN=$ATLAS_AUTH_TOKEN" \
            "FORGE_AUTH_TOKEN=$FORGE_AUTH_TOKEN" \
            'SESSION_LIMIT=5000' > production.env
          scp production.env deploy@"$SERVER_HOST":/home/deploy/backend_lab/lab/.env

      - name: Deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh deploy@"$SERVER_HOST" \
            'cd /home/deploy/backend_lab/lab && docker compose -f docker-compose.prod.yml config --quiet && docker compose -f docker-compose.prod.yml up --build -d --wait'

      - name: Verify
        run: curl --fail --show-error --silent --retry 12 --retry-delay 5 https://mateolabs.dev/healthz
