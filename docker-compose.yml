services:
  vault:
    build:
      context: ${VAULT_BUILD_CONTEXT:-../vaultsh}
    ports:
      - "${VAULT_PORT:-8080}:8080"
    environment:
      CONTENT_PATH: /app/content
    volumes:
      - ./content:/app/content:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  atlas:
    build:
      context: ${ATLAS_BUILD_CONTEXT:-../atlas}
    ports:
      - "${ATLAS_PORT:-8081}:8080"
    environment:
      ATLAS_CONTENT_ROOT: /app/content
    volumes:
      - ./content:/app/content:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

